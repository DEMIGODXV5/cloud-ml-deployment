<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Flower Predictor</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                135deg,
                #667eea,
                #764ba2
            );
            padding:20px;
        }

        .container{
            width:500px;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,0.2);
            padding:40px;
            border-radius:25px;
            box-shadow:0 8px 32px rgba(0,0,0,0.2);
            text-align:center;
            color:white;
        }

        .icon{
            font-size:60px;
            margin-bottom:10px;
        }

        h1{
            margin-bottom:15px;
            font-size:32px;
            font-weight:700;
        }

        .badge{
            background:#00c853;
            padding:10px;
            border-radius:20px;
            margin-bottom:20px;
            font-weight:600;
        }

        .cards{
            display:flex;
            justify-content:center;
            gap:10px;
            margin-bottom:25px;
            flex-wrap:wrap;
        }

        .card{
            background:rgba(255,255,255,0.2);
            padding:10px 15px;
            border-radius:12px;
            font-size:14px;
        }

        input{
            width:100%;
            padding:15px;
            margin:10px 0;
            border:none;
            outline:none;
            border-radius:12px;
            font-size:16px;
            background:rgba(255,255,255,0.9);
        }

        button{
            width:100%;
            margin-top:20px;
            padding:15px;
            border:none;
            border-radius:12px;
            font-size:18px;
            font-weight:600;
            color:white;
            cursor:pointer;
            background:linear-gradient(
                135deg,
                #00c6ff,
                #0072ff
            );
            transition:.3s;
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 20px rgba(0,0,0,.25);
        }

        .prediction{
            margin-top:25px;
            padding:18px;
            border-radius:15px;
            background:linear-gradient(
                135deg,
                #00c6ff,
                #0072ff
            );
            font-size:22px;
            font-weight:700;
            color:white;
        }

        .flower-image{
            width:250px;
            height:250px;
            object-fit:cover;
            border-radius:20px;
            margin-top:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
            border:3px solid rgba(255,255,255,0.4);
        }

        .footer{
            margin-top:25px;
            font-size:13px;
            opacity:.8;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="icon">
        🌸
    </div>

    <h1>Iris Flower Predictor</h1>

    <div class="badge">
        🎯 Model Accuracy: 100%
    </div>

    <div class="cards">
        <div class="card">🌳 Random Forest</div>
        <div class="card">⚡ Flask API</div>
        <div class="card">☁️ Render Cloud</div>
    </div>

    <form action="/predict" method="POST">

        <input
            type="number"
            step="0.1"
            name="sl"
            placeholder="Sepal Length"
            required>

        <input
            type="number"
            step="0.1"
            name="sw"
            placeholder="Sepal Width"
            required>

        <input
            type="number"
            step="0.1"
            name="pl"
            placeholder="Petal Length"
            required>

        <input
            type="number"
            step="0.1"
            name="pw"
            placeholder="Petal Width"
            required>

        <button type="submit">
            Predict Flower
        </button>

    </form>

    {% if prediction %}

    <div class="prediction">
        🌺 Prediction: {{ prediction }}
    </div>

    <img
        src="{{ url_for('static', filename=image if image else 'images/setosa.jpg') }}"
        class="flower-image">

    {% endif %}

    <div class="footer">
        Cloud-Based Machine Learning Deployment Project
    </div>

</div>

</body>

</html>
